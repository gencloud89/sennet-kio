name: Build Desktop Win Mac Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "src-tauri/**"
      - "crates/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-desktop-win-mac-artifacts.yml"

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  HUSKY: 0

jobs:
  build-desktop:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: SENNET-VPN-Windows-x64
            bundle_glob: target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup*.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: SENNET-VPN-Windows-ARM64
            bundle_glob: target/aarch64-pc-windows-msvc/release/bundle/nsis/*setup*.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: SENNET-VPN-macOS-Apple-Silicon
            bundle_glob: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: SENNET-VPN-macOS-Intel
            bundle_glob: target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.0"
          targets: ${{ matrix.target }}

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          prefix-key: desktop-artifacts-${{ matrix.target }}

      - name: Install x86 OpenSSL (macOS Intel only)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          arch -x86_64 brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies and prebuild
        run: |
          pnpm install --frozen-lockfile
          pnpm run prebuild ${{ matrix.target }}

      - name: Build desktop bundle
        run: pnpm build --target ${{ matrix.target }}
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: error
          retention-days: 14
