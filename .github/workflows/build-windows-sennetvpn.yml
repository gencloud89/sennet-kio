name: Build Windows — SENNET VPN

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "pnpm-lock.yaml"

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  HUSKY: 0

jobs:
  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust 1.91.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.0"
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          prefix-key: "v1-rust-windows"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Mihomo binaries for Windows x64
        run: pnpm run prebuild x86_64-pc-windows-msvc

      - name: Build Windows installer
        run: pnpm build --target x86_64-pc-windows-msvc
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: SENNET-VPN-Windows-x64-v${{ steps.version.outputs.VERSION }}
          path: target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
          retention-days: 14

  build-windows-arm64:
    name: Build Windows ARM64
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust 1.91.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.0"
          targets: aarch64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          prefix-key: "v1-rust-windows-arm64"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Mihomo binaries for Windows ARM64
        run: pnpm run prebuild aarch64-pc-windows-msvc

      - name: Build Windows ARM64 installer
        run: pnpm build --target aarch64-pc-windows-msvc
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Upload NSIS installer (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: SENNET-VPN-Windows-ARM64-v${{ steps.version.outputs.VERSION }}
          path: target/aarch64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
          retention-days: 14
